<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tab Reload Timer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header class="top">
    <div class="brand">
      <svg class="mark" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 4a8 8 0 1 0 7.4 5" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
        <path d="M19.8 2.6v5h-5z" fill="currentColor"/>
      </svg>
      <span class="brand-name">Tab&nbsp;Reload&nbsp;Timer</span>
    </div>
    <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 8.5a3.5 3.5 0 1 1 0 7 3.5 3.5 0 0 1 0-7zm8.6 5-.1-3-2.3-.6a6.6 6.6 0 0 0-.7-1.6l1.2-2.1-2.1-2.1-2.1 1.2a6.6 6.6 0 0 0-1.6-.7L12.3 2.3h-3l-.6 2.3a6.6 6.6 0 0 0-1.6.7L5 4.1 2.9 6.2l1.2 2.1a6.6 6.6 0 0 0-.7 1.6l-2.3.6v3l2.3.6c.2.6.4 1.1.7 1.6l-1.2 2.1 2.1 2.1 2.1-1.2c.5.3 1 .5 1.6.7l.6 2.3h3l.6-2.3c.6-.2 1.1-.4 1.6-.7l2.1 1.2 2.1-2.1-1.2-2.1c.3-.5.5-1 .7-1.6z"
          fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <section id="settingsPanel" class="settings" hidden>
    <label class="setting-row">
      <span>Badge countdown</span>
      <input type="checkbox" id="setBadge" class="switch">
    </label>
    <label class="setting-row">
      <span>Default interval</span>
      <span class="inline-input"><input type="number" id="setDefaultMin" min="1" max="1440"> <em>min</em></span>
    </label>
  </section>

  <main>
    <section class="card" id="currentCard">
      <div class="tab-row">
        <span class="favicon-wrap"><img id="curFavicon" alt=""><svg class="favicon-fallback" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3.5 12h17M12 3.5c2.6 2.4 2.6 14.6 0 17-2.6-2.4-2.6-14.6 0-17z" fill="none" stroke="currentColor" stroke-width="1.4"/></svg></span>
        <div class="tab-meta">
          <div class="label-line"><span class="micro-label">This tab</span><span class="status-dot" id="statusDot"></span></div>
          <div class="host" id="curHost">—</div>
        </div>
      </div>

      <!-- idle: configure + start -->
      <div id="idleView">
        <div class="micro-label">Reload every</div>
        <div class="interval-inputs">
          <label><input type="number" id="inH" min="0" max="99" value="0"><span>h</span></label>
          <label><input type="number" id="inM" min="0" max="59" value="5"><span>m</span></label>
          <label><input type="number" id="inS" min="0" max="59" value="0"><span>s</span></label>
        </div>
        <div class="chips" id="chips">
          <button data-sec="30">30s</button>
          <button data-sec="60">1m</button>
          <button data-sec="120">2m</button>
          <button data-sec="300">5m</button>
          <button data-sec="900">15m</button>
          <button data-sec="1800">30m</button>
          <button data-sec="3600">1h</button>
        </div>

        <details class="more">
          <summary>More options</summary>
          <div class="more-body">
            <label class="opt-row">
              <span>Random variation <em>±</em></span>
              <span class="inline-input"><input type="number" id="inVar" min="0" max="3600" value="0"> <em>sec</em></span>
            </label>
            <label class="opt-row">
              <span>Only reload when tab is inactive</span>
              <input type="checkbox" id="inInactive" class="switch">
            </label>
            <label class="opt-row">
              <span>Hard reload <em>(bypass cache)</em></span>
              <input type="checkbox" id="inCache" class="switch">
            </label>
            <label class="opt-row">
              <span>Stop after</span>
              <span class="inline-input"><input type="number" id="inLimit" min="0" max="9999" placeholder="∞"> <em>reloads</em></span>
            </label>
          </div>
        </details>

        <button id="startBtn" class="primary">▶&nbsp; Start reloading</button>
        <div class="note" id="minNote" hidden>Minimum interval is 30 seconds</div>
      </div>

      <!-- running: countdown -->
      <div id="runView" hidden>
        <div class="countdown-wrap">
          <div class="countdown" id="countdown">0:00</div>
          <div class="countdown-sub" id="runMeta"></div>
        </div>
        <div class="scale">
          <div class="scale-base"></div>
          <div class="scale-fill" id="sweep"></div>
        </div>
        <div class="run-actions">
          <button id="nowBtn" title="Reload now">
            <svg viewBox="0 0 24 24"><path d="M12 5a7 7 0 1 0 6.5 4.4" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><path d="M18.8 3.2v4.4h-4.4z" fill="currentColor"/></svg>
            Now
          </button>
          <button id="pauseBtn">
            <svg viewBox="0 0 24 24" id="pauseIcon"><path d="M8 5v14M16 5v14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg>
            <span id="pauseLabel">Pause</span>
          </button>
          <button id="stopBtn" class="danger">
            <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
            Stop
          </button>
        </div>
      </div>

      <!-- non-reloadable page -->
      <div id="blockedView" hidden>
        <p class="blocked-msg">This page can’t be auto-reloaded.<br><span>Browser pages and the Web Store are off-limits to extensions.</span></p>
      </div>
    </section>

    <section class="jobs" id="jobsSection" hidden>
      <div class="jobs-head">
        <span class="micro-label">Other active jobs</span>
        <span class="count" id="jobCount">0</span>
      </div>
      <ul id="jobsList"></ul>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
