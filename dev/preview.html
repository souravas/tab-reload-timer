<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>popup preview</title>
  <script src="chrome-stub.js"></script>
</head>
<body>
  <script>
    (async () => {
      const bust = `?v=${Date.now()}`;
      const html = await (await fetch('../popup/popup.html' + bust)).text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = '../popup/popup.css' + bust;
      const cssReady = new Promise((r) => { link.onload = r; });
      document.head.appendChild(link);
      for (const el of [...doc.body.children]) {
        if (el.tagName !== 'SCRIPT') document.body.appendChild(el);
      }
      await cssReady;
      const s = document.createElement('script');
      s.src = '../popup/popup.js' + bust;
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
